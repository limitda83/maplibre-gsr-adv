<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>maplibre-gsr-adv TIFF Example</title>
    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      .status {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 8px 10px;
        border-radius: 6px;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="status" class="status">Loading TIFF...</div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
